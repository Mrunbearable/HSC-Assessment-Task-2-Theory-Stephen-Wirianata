<!DOCTYPE html>
<html>
<head>
<title>XSS Demo</title>
</head>

<body>

<input id="nameInput" placeholder="Enter your name">
<button onclick="showName()">Submit</button>

<div id="output"></div> 

<script>
function showName() {

    const name = document.getElementById("nameInput").value;

    document.getElementById("output").textContent =
        "Welcome, " + name;
}
</script>

</body>
</html>
